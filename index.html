<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Cadastro de Produtos</title>

<style>
body{
font-family: Arial;
background:#f5f5f5;
margin:30px;
}
.container{
max-width:900px;
margin:auto;
background:white;
padding:20px;
border-radius:8px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}
h1{
text-align:center;
margin-bottom:20px;
}
.form-row{
display:flex;
gap:10px;
margin-bottom:10px;
flex-wrap:wrap;
}
input{
padding:6px;
}
button{
padding:6px 10px;
cursor:pointer;
}
table{
width:100%;
border-collapse:collapse;
margin-top:15px;
}
th,td{
border:1px solid #ccc;
padding:6px;
text-align:center;
}
th{
background:#eee;
}
#mensagem{
margin-top:10px;
padding:8px;
display:none;
background:#e7f3ff;
}
#resumo{
margin-top:10px;
padding:8px;
background:#f0f0f0;
display:none;
}
</style>
</head>

<body>
<div class="container">

<h1>Cadastro de Produtos</h1>
  
<div class="form-row">
<label>Produto</label>
<input id="nome">
<label>Preço</label>
<input id="preco" type="number" step="0.01">
<label>Quantidade</label>
<input id="quantidade" type="number">
</div>

<div class="form-row">
<button onclick="adicionar()">Adicionar</button>
<button onclick="listar()">Listar</button>
<button onclick="mostrarResumo()">Resumo</button>
<button onclick="limparInputs()">Limpar inputs</button>
<button onclick="limparTudo()">Limpar tudo</button>
</div>
<hr>
<h3>Remover por índice</h3>

<div class="form-row">
<input id="indice" placeholder="ex: 0">
<button onclick="remover()">Remover</button>
</div>
<div id="mensagem"></div>
<table id="tabela" style="display:none">
<thead>
<tr>
<th>Índice</th>
<th>Produto</th>
<th>Preço</th>
<th>Quantidade</th>
<th>Subtotal</th>
</tr>
</thead>
<tbody></tbody>
</table>
<div id="resumo"></div>
</div>
<script>

let produtos=[]
function msg(t){
let m=document.getElementById("mensagem")
m.innerText=t
m.style.display="block"
}
function adicionar(){
let nome=document.getElementById("nome").value.trim()
let preco=parseFloat(document.getElementById("preco").value)
let qtd=parseInt(document.getElementById("quantidade").value)
if(nome==""){
msg("Digite o nome do produto")
return
}
if(isNaN(preco) || preco<=0){
msg("Preço inválido")
return
}
if(isNaN(qtd) || qtd<=0){
msg("Quantidade inválida")
return
}
produtos.push({
nome:nome,
preco:preco,
quantidade:qtd
})
msg("Produto adicionado")
limparInputs()
}
function listar(){
if(produtos.length==0){
msg("Nenhum produto cadastrado")
return
}
let tbody=document.querySelector("#tabela tbody")
tbody.innerHTML=""
produtos.forEach(function(p,i){
let tr=document.createElement("tr")
let subtotal=p.preco*p.quantidade
tr.innerHTML=
"<td>"+i+"</td>"+
"<td>"+p.nome+"</td>"+
"<td>R$ "+p.preco.toFixed(2)+"</td>"+
"<td>"+p.quantidade+"</td>"+
"<td>R$ "+subtotal.toFixed(2)+"</td>"
tbody.appendChild(tr)
})
document.getElementById("tabela").style.display="table"
}
function remover(){
let i=parseInt(document.getElementById("indice").value)
if(isNaN(i) || i<0 || i>=produtos.length){
msg("Índice inválido")
return
}
produtos.splice(i,1)
msg("Produto removido")
listar()
}
function limparInputs(){
document.getElementById("nome").value=""
document.getElementById("preco").value=""
document.getElementById("quantidade").value=""
}
function limparTudo(){
produtos=[]
document.querySelector("#tabela tbody").innerHTML=""
document.getElementById("tabela").style.display="none"
document.getElementById("resumo").style.display="none"
msg("Todos os produtos foram removidos")
}
function mostrarResumo(){
let totalProdutos=produtos.length
let totalItens=0
let valorTotal=0
produtos.forEach(function(p){
totalItens+=p.quantidade
valorTotal+=p.preco*p.quantidade
})
let r=document.getElementById("resumo")
r.innerHTML=
"Total de produtos: "+totalProdutos+"<br>"+
"Total de itens: "+totalItens+"<br>"+
"Valor total: R$ "+valorTotal.toFixed(2)
r.style.display="block"
}
</script>
</body>
</html>
