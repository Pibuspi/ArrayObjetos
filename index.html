<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Cadastro de Produtos (Array de Objetos)</title>
    <style>
      body {
        font-family:Arial,sans-serif;
        margin:24px;
        background:#ffffff;
    }
      .container {
        max-width:900px;
        margin:0 auto
    }
      h1 {
        margin:0 0 8px;
        font-size:20px;
        color:#000
    }
      .row {
        display:flex;
        gap:8px;
        align-items:center;
        margin-bottom:8px
    }
      input[type="text"],
      input[type="number"],
      input[type="tel"] {
        padding:6px 10px;
      }
      .small {
        font-size:12px;
        color:#000000;
        margin-right:6px;
      }
      button {
        padding:6px 10px;
        cursor:pointer;
      }
      hr {
        margin:8px 8px 8px 0;
    }
      table {
        width:100%;
        margin-top:8px
    }
      th,td {
        padding:6px;
        text-align:left;
    }
      #mensagem {
        margin-top:8px;
        padding:6px;
        display:none
    }
      #resumo {
        margin-top:8px;
        display:none
    }
    </style>
</head>
<body>
  <div class="container">
    <h1>Cadastro de Produtos (Array de Objetos)</h1>

    <form id="produto-form" onsubmit="return false">
      <div class="row">
        <span class="small">Produto</span>
        <input id="nome" type="text" style="flex:2" />
        <span class="small">Preço(R$)</span>
        <input id="preco" type="number" min="0" step="0.01" style="width:110px" />
        <span class="small">Quantidade</span>
        <input id="quantidade" type="number" min="1" step="1" style="width:80px" />
        <button id="adicionarBtn" type="button">Adicionar</button>
        <button id="listarBtn" type="button" class="ghost">Listar</button>
        <button id="resumoBtn" type="button" class="ghost">Resumo</button>
        <button id="limparInputsBtn" type="button" class="ghost">Limpar produtos</button>
        <button id="limparTudoBtn" type="button" class="red">Limpar tudo</button>
      </div>
    </form>

    <div class="row"><hr style="width:100%" /></div>
    <div class="row"><strong>Remover por índice</strong></div>
    <div class="row">
      <input id="removeIndex" type="tel" placeholder="ex: 0" style="width:80px" />
      <button id="removerBtn" type="button" class="ghost">Remover</button>
    </div>
    <div id="mensagem"></div>
    <div id="tableWrap" style="display:none">
      <table id="produtosTable">
        <thead>
          <tr>
            <th>Índice</th>
            <th>Nome</th>
            <th>Preço</th>
            <th>Quantidade</th>
            <th>Subtotal</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>
    <div id="resumo"></div>
  </div>
  <script>
    const produtos = [];
    const nomeInput = document.querySelector('#nome');
    const precoInput = document.querySelector('#preco');
    const quantidadeInput = document.querySelector('#quantidade');
    const adicionarBtn = document.querySelector('#adicionarBtn');
    const listarBtn = document.querySelector('#listarBtn');
    const resumoBtn = document.querySelector('#resumoBtn');
    const limparInputsBtn = document.querySelector('#limparInputsBtn');
    const limparTudoBtn = document.querySelector('#limparTudoBtn');
    const removerBtn = document.querySelector('#removerBtn');
    const removeIndexInput = document.querySelector('#removeIndex');
    const mensagemEl = document.querySelector('#mensagem');
    const produtosTbody = document.querySelector('#produtosTable tbody');
    const tableWrap = document.querySelector('#tableWrap');
    const resumoDiv = document.querySelector('#resumo');

    function formatCurrency(value) {
      return new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(value);
    }
    function mostrarMensagem(text, timeout = 2200) {
      mensagemEl.textContent = text;
      mensagemEl.style.display = 'block';
      clearTimeout(mostrarMensagem._t);
      mostrarMensagem._t = setTimeout(function () {
        mensagemEl.style.display = 'none';
      }, timeout);
    }
    function adicionarProduto() {
      const nome = nomeInput.value.trim();
      const valor = parseFloat(String(precoInput.value).replace(',', '.'));
      const quantidade = parseInt(quantidadeInput.value, 10);
      
      produtos.push({ nome: nome, valor: valor, quantidade: quantidade, total: valor * quantidade });
      mostrarMensagem('Produto adicionado. Total: ' + produtos.length);
      limparInputs();
    }
    function atualizarTabela() {
      produtosTbody.innerHTML = '';
      produtos.forEach(function (p, i) {
        const tr = document.createElement('tr');
        tr.innerHTML = '<td>' + i + '</td>' +
          '<td>' + p.nome + '</td>' +
          '<td>' + formatCurrency(p.valor) + '</td>' +
          '<td>' + p.quantidade + '</td>' +
          '<td>' + formatCurrency(p.total) + '</td>';
        produtosTbody.appendChild(tr);
      });
    }
    function listarProdutos() {
      if (produtos.length === 0) {
        mostrarMensagem('Nenhum produto cadastrado.');
        tableWrap.style.display = 'none';
        return;
      }
      atualizarTabela();
      tableWrap.style.display = 'block';
    }
    function removerPorIndice() {
      const idx = parseInt(removeIndexInput.value, 10);
      if (Number.isNaN(idx) || idx < 0 || idx >= produtos.length) {
        mostrarMensagem('Índice inválido.');
        return;
      }
      produtos.splice(idx, 1);
      mostrarMensagem('Removido índice ' + idx + '. Total: ' + produtos.length);
      if (tableWrap.style.display === 'block') {
        atualizarTabela();
      }
    }
    function limparInputs() {
      nomeInput.value = '';
      precoInput.value = '';
      quantidadeInput.value = '';
      nomeInput.focus();
    }
    function limparTudo() {
      produtos.length = 0;
      tableWrap.style.display = 'none';
      mostrarMensagem('Todos os produtos foram removidos.');
    }
    function mostrarResumo() {
      const totalLinhas = produtos.length;
      let totalItens = 0;
      let valorTotal = 0;
      produtos.forEach(function (p) {
        totalItens = totalItens + p.quantidade;
        valorTotal = valorTotal + p.total;
      });
      resumoDiv.innerHTML =
        'Total de produtos (linhas): ' + totalLinhas + '<br>' +
        'Total de itens: ' + totalItens + '<br>' +
        'Valor total: ' + formatCurrency(valorTotal);
      resumoDiv.style.display = 'block';
    }
    adicionarBtn.addEventListener('click', adicionarProduto);
    listarBtn.addEventListener('click', listarProdutos);
    resumoBtn.addEventListener('click', mostrarResumo);
    limparInputsBtn.addEventListener('click', limparInputs);
    limparTudoBtn.addEventListener('click', limparTudo);
    removerBtn.addEventListener('click', removerPorIndice);
    quantidadeInput.addEventListener('keydown', function (e) {
      if (e.key === 'Enter') {
        adicionarProduto();
      }
    });
  </script>
</body>
</html>
